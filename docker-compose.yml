# =============================================================================
# RAPTOR RAG Platform — Docker Compose
# =============================================================================
# Start all services:  docker compose up -d
# Stop all services:   docker compose down
# View logs:           docker compose logs -f api
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: raptor-postgres
    environment:
      POSTGRES_USER: raptor
      POSTGRES_PASSWORD: raptor
      POSTGRES_DB: raptor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raptor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — Vector database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: raptor-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Cache, session store, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: raptor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: raptor-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO bucket initialization
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: raptor-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/raptor-documents --ignore-existing;
        mc mb local/raptor-trees --ignore-existing;
        mc mb local/raptor-models --ignore-existing;
        echo 'Buckets created successfully';
      "

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raptor-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://raptor:raptor@postgres:5432/raptor
      DATABASE_URL_SYNC: postgresql://raptor:raptor@postgres:5432/raptor
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: raptor-documents
      STORAGE_TREE_BUCKET: raptor-trees
      STORAGE_MODEL_BUCKET: raptor-models
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      LLM_PROVIDER: ollama
      LLM_MODEL: "mistral:latest"
      OLLAMA_BASE_URL: http://host.docker.internal:11435
      RERANKER_ENABLED: "true"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Celery Worker — Background jobs
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: raptor-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://raptor:raptor@postgres:5432/raptor
      DATABASE_URL_SYNC: postgresql://raptor:raptor@postgres:5432/raptor
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: raptor-documents
      STORAGE_TREE_BUCKET: raptor-trees
      STORAGE_MODEL_BUCKET: raptor-models
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      LLM_PROVIDER: ollama
      LLM_MODEL: "mistral:latest"
      OLLAMA_BASE_URL: http://host.docker.internal:11435
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
  redis_data:
  minio_data:
