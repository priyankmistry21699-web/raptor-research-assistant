name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check app/ tests/ --output-format=github
      - name: Format check
        run: ruff format --check app/ tests/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r app/ -ll -ii --exclude app/frontend/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raptor
          POSTGRES_PASSWORD: raptor
          POSTGRES_DB: raptor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U raptor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://raptor:raptor@localhost:5432/raptor
      DATABASE_URL_SYNC: postgresql://raptor:raptor@localhost:5432/raptor
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      RERANKER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - name: Run tests
        run: pytest tests/ -x --tb=short -q --timeout=120
      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t raptor-api:${{ github.sha }} -f Dockerfile .
      - name: Build Worker image
        run: docker build -t raptor-worker:${{ github.sha }} -f Dockerfile.worker .
