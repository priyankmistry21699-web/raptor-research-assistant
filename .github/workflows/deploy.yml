name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: us-central1
  GAR_REGISTRY: ${{ secrets.GCP_PROJECT }}/raptor
  API_SERVICE: raptor-api
  WORKER_SERVICE: raptor-worker

jobs:
  deploy-preflight:
    name: Deploy Preflight
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    steps:
      - id: check
        env:
          ACTOR: ${{ github.actor }}
          GCP_PROJECT_SECRET: ${{ secrets.GCP_PROJECT }}
          GCP_WIF_SECRET: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_SECRET: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=dependabot" >> "$GITHUB_OUTPUT"
          elif [ -z "$GCP_PROJECT_SECRET" ] || [ -z "$GCP_WIF_SECRET" ] || [ -z "$GCP_SERVICE_ACCOUNT_SECRET" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=missing-secrets" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=ready" >> "$GITHUB_OUTPUT"
          fi

  dependabot-deploy-skipped:
    name: Dependabot Deploy Notice
    runs-on: ubuntu-latest
    needs: deploy-preflight
    if: needs.deploy-preflight.outputs.skip_reason == 'dependabot'
    steps:
      - name: Explain skipped deployment
        run: |
          echo "Deploy is intentionally skipped for Dependabot-triggered runs."
          echo "GitHub does not expose repository secrets to Dependabot workflows by default."
          echo "That means GCP auth inputs are unavailable, so deployment cannot run safely."

  missing-gcp-secrets:
    name: Missing GCP Secrets Notice
    runs-on: ubuntu-latest
    needs: deploy-preflight
    if: needs.deploy-preflight.outputs.skip_reason == 'missing-secrets'
    steps:
      - name: Explain skipped deployment
        run: |
          echo "Deploy is skipped because required GCP secrets are not available in this workflow context."
          echo "Expected secrets: GCP_PROJECT, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT."
          echo "Check repository secrets, environment secrets, and whether this run has access to them."

  build-and-push:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: deploy-preflight
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy-preflight.outputs.should_deploy == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push API image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.API_SERVICE }}:${{ github.sha }} -f Dockerfile .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.API_SERVICE }}:${{ github.sha }}

      - name: Build and push Worker image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.WORKER_SERVICE }}:${{ github.sha }} -f Dockerfile.worker .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.WORKER_SERVICE }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deploy-preflight, build-and-push]
    if: needs.deploy-preflight.outputs.should_deploy == 'true'
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy API to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}-staging
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.API_SERVICE }}:${{ github.sha }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-preflight, deploy-staging]
    if: needs.deploy-preflight.outputs.should_deploy == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy API to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GAR_REGISTRY }}/${{ env.API_SERVICE }}:${{ github.sha }}
