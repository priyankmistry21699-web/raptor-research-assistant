# Configuration file for RAPTOR Research Assistant
arxiv:
  categories: [cs.AI, cs.LG, stat.ML]
  max_results: 100
embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
vector_db:
  provider: chroma
  collection: paper_chunks
raptor:
  tree_dir: data/raw/paper_trees
  levels: [paper, topic, section, chunk]
  topic_clustering:
    method: agglomerative # agglomerative or title-based
    max_topics: 5
    metric: cosine
    linkage: average
  summarization:
    max_input_chars: 3000
    max_tokens: 150
    temperature: 0.3
llm:
  default_model: mistral # registry alias: 'mistral' or 'groq-llama'
  models:
    mistral:
      model: mistral:latest
      api_url: http://localhost:11435/v1/chat/completions
      api_key: ollama
      timeout: 180
    groq-llama:
      model: llama-3.3-70b-versatile
      api_url: https://api.groq.com/openai/v1/chat/completions
      timeout: 30
  task_params:
    qa: { max_tokens: 1024, temperature: 0.3 }
    summarize: { max_tokens: 512, temperature: 0.2 }
    compare: { max_tokens: 1500, temperature: 0.3 }
    explain: { max_tokens: 1200, temperature: 0.4 }
retrieval:
  top_k: 5
  include_tree_context: true
session:
  max_sessions: 100
  max_history_turns: 10
feedback:
  storage: data/feedback/feedback.jsonl
  types: [helpful, incorrect, hallucination, correction]
preference:
  storage: data/preference/preferences.jsonl
  auto_build_on_feedback: true
finetune:
  base_model: mistralai/Mistral-7B-v0.1
  output_dir: models/
  method: dpo
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]
  training:
    num_epochs: 1
    batch_size: 2
    learning_rate: 5e-5
    gradient_accumulation_steps: 4
    max_length: 512
    max_prompt_length: 256
  dpo:
    beta: 0.1
learning_loop:
  auto_enabled: false
  min_new_feedback: 10          # New feedback entries before auto-trigger
  check_interval_seconds: 300   # How often to check (5 min)
  prefer_finetuned: true        # Auto-select fine-tuned model when available
evaluation:
  llm_model: ollama/mistral:latest   # LLM judge for RAGAS metrics
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  default_metrics: [faithfulness, answer_relevancy, context_precision]
  storage: data/evaluation/eval_results.jsonl
frontend:
  type: gradio
  port: 7860
